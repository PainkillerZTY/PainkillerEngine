<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PainkillerEngine Dashboard</title>
<style>
:root{--bg:#0f1117;--bg2:#1a1d27;--bg3:#242838;--text:#e4e6f0;--text2:#8b90a0;--accent:#6c8cff;--green:#4ade80;--yellow:#facc15;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.header{background:linear-gradient(135deg,#1a1d27,#242838);border-bottom:1px solid rgba(108,140,255,0.15);padding:20px 32px}
.header h1{font-size:24px;font-weight:700}.header h1 span{color:var(--accent)}.header .sub{color:var(--text2);font-size:14px;margin-top:4px}
.container{max-width:1400px;margin:0 auto;padding:24px 32px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);padding:20px}
.card h3{font-size:13px;text-transform:uppercase;letter-spacing:0.5px;color:var(--text2);margin-bottom:12px}
.card .big{font-size:32px;font-weight:700}
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.member{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:8px}
.member .avatar{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(108,140,255,0.15)}
.member .name{font-size:13px;font-weight:600}.member .role{font-size:11px;color:var(--text2)}
.member .dot{width:8px;height:8px;border-radius:50%}
.s-active{background:var(--green);box-shadow:0 0 8px var(--green)}.s-idle{background:var(--yellow)}.s-off{background:var(--text2)}
.task-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px;font-size:13px}
.session-item{padding:10px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px;font-size:13px}
.session-item .date{font-size:11px;color:var(--text2)}.session-item .sum{margin-top:4px}
@media(max-width:768px){.grid,.two-col{grid-template-columns:1fr}}
</style></head><body>
<div class="header"><h1>??? <span>PainkillerEngine</span> AI Team Dashboard</h1>
<div class="sub" id="updateTime">Loading...</div></div>
<div class="container" id="app"><div style="text-align:center;padding:40px;color:var(--text2)">Loading...</div></div>
<script>
async function load(){
try{
var r=await fetch("/api/data");var d=await r.json();var t=d.tasks,ss=d.sessions,tm=d.team;
document.getElementById("updateTime").textContent="Updated: "+new Date().toLocaleString();
var h=`<div class="grid"><div class="card"><h3>?? Active</h3><div class="big" style="color:var(--yellow)">${t.active.length}</div></div><div class="card"><h3>? Completed</h3><div class="big" style="color:var(--green)">${t.completed.length}</div></div><div class="card"><h3>?? Team</h3><div class="big" style="color:var(--accent)">${tm.filter(function(m){return m.s!=="off"}).length}/5</div></div></div>`;
h+=`<div class="two-col"><div class="card"><h3>?? Active Tasks</h3>`;
if(t.active.length===0)h+=`<div style="color:var(--text2);padding:12px">No active tasks</div>`;
t.active.forEach(function(i){h+=`<div class="task-item"><span>??</span>${i.n.replace(".md","")}</div>`});
h+=`</div><div class="card"><h3>?? Team</h3><div class="team-grid">`;
var em={you:"??",codex:"??",render:"??",gameplay:"??",world:"??",network:"??"};
tm.forEach(function(m){h+=`<div class="member"><div class="avatar">${em[m.r]||"??"}</div><div class="info"><div class="name">${m.n}</div><div class="role">${m.t}</div></div><div class="dot s-${m.s}"></div></div>`});
h+=`</div></div></div>`;
h+=`<div class="grid"><div class="card"><h3>? Completed</h3>`;
t.completed.slice(-5).reverse().forEach(function(i){h+=`<div class="task-item"><span>?</span>${i.n.replace(".md","")}</div>`});
h+=`</div><div class="card"><h3>?? Sessions</h3>`;
ss.slice(0,5).forEach(function(s){h+=`<div class="session-item"><div class="date">${s.d} - ${s.a}</div><div class="sum">${s.s||""}</div></div>`});
h+=`</div><div class="card"><h3>?? Backlog</h3>`;
t.backlog.forEach(function(i){h+=`<div class="task-item"><span>?</span>${i.n.replace(".md","")}</div>`});
h+=`</div></div>`;document.getElementById("app").innerHTML=h;
}catch(e){document.getElementById("app").innerHTML='<div style="text-align:center;padding:40px;color:#ef4444">Failed to load</div>';}
}
load();setInterval(load,30000);
</script></body></html>
